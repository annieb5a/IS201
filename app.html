<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Where Am I? - Travel Game</title>
    <style>
        body { 
            text-align: center; 
            font-family: 'Arial', sans-serif; 
            background: #2c3e50; 
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1488646953014-85cb44e25828?q=80&w=2000');
            background-size: cover;
            color: white; 
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            padding: 40px;
            border-radius: 20px;
            display: inline-block;
            margin: auto;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: #2980b9; margin-top: 0; }
        #clue-text { font-size: 20px; margin: 20px 0; font-weight: bold; min-height: 60px; }
        button { 
            padding: 15px 25px; 
            font-size: 16px; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            margin: 10px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #27ae60; color: white; }
        #answer-text { 
            font-size: 24px; 
            color: #e67e22; 
            font-weight: bold; 
            margin-top: 20px; 
            display: none; 
            padding: 10px;
            border: 2px solid #e67e22;
            border-radius: 10px;
        }
        .back { color: white; text-decoration: none; margin-top: 20px; display: block; }
    </style>
</head>
<body>

    <div class="container">
        <nav style="text-align: center; margin-bottom: 30px; padding: 10px; background: rgba(255, 255, 255, 0.1); border-radius: 8px;">
    <a href="index.html" style="color: #3498db; text-decoration: none; font-weight: bold; margin: 0 10px;">Home</a> | 
    <a href="about.html" style="color: #3498db; text-decoration: none; font-weight: bold; margin: 0 10px;">Resume</a> | 
    <a href="fromscratch.html" style="color: #3498db; text-decoration: none; font-weight: bold; margin: 0 10px;">My Travels</a>
        </nav>
        <h1>✈️ Destination Guesser</h1>
        <p>I'll give you a clue, you guess the place!</p>
        
        <div id="clue-text">Press the button to get a clue!</div>
        
        <button class="btn-blue" onclick="getClue()">New Destination</button>
        <div id="answer-text"></div>
        <button class="btn-green" id="reveal-btn" onclick="showAnswer()" style="display:none;">Show Answer</button>
    </div>

    <a href="fromscratch.html" class="back">← Back to My Travels</a>

    <script>
        // Game Data
        const travelData = [
            {clue: "I am home to the Eiffel Tower and famous bakeries.", place: "Paris, France"},
            {clue: "I have red double-decker buses and a big clock named Big Ben.", place: "London, England"},
            {clue: "I am a city of canals, gondolas, and no cars.", place: "Venice, Italy"},
            {clue: "I feature a giant statue of Christ overlooking the ocean.", place: "Rio de Janeiro, Brazil"},
            {clue: "I am known as the 'Big Apple' and have a massive park in my center.", place: "New York City, USA"}
        ];

        // Functions
        function getClue() {
            // Pick a random spot
            var randomIndex = Math.floor(Math.random() * travelData.length);
            var selected = travelData[randomIndex];

            // Update the text on the screen
            document.getElementById('clue-text').innerHTML = selected.clue;
            document.getElementById('answer-text').innerHTML = selected.place;
            
            // Hide previous answer and show the button
            document.getElementById('answer-text').style.display = 'none';
            document.getElementById('reveal-btn').style.display = 'inline-block';
        }

        function showAnswer() {
            document.getElementById('answer-text').style.display = 'block';
        }
    </script>
</body>
</html>
