<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rock Paper Scissors</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #1e1e2f;
        color: white;
        padding: 50px;
    }

    h1 {
        margin-bottom: 20px;
    }

    .buttons button {
        padding: 15px 25px;
        margin: 10px;
        font-size: 18px;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        transition: 0.2s;
    }

    .buttons button:hover {
        transform: scale(1.1);
    }

    .rock { background: #ff6b6b; }
    .paper { background: #4ecdc4; }
    .scissors { background: #ffe66d; }

    .score {
        margin-top: 20px;
        font-size: 20px;
    }

    .result {
        margin-top: 20px;
        font-size: 22px;
        font-weight: bold;
    }

    .winner {
        margin-top: 30px;
        font-size: 28px;
        color: #00ffcc;
    }
</style>
</head>
<body>

<h1>Rock Paper Scissors</h1>

<div class="buttons">
    <button class="rock" onclick="playGame('rock')">Rock</button>
    <button class="paper" onclick="playGame('paper')">Paper</button>
    <button class="scissors" onclick="playGame('scissors')">Scissors</button>
</div>

<div class="score">
    You: <span id="playerScore">0</span> |
    Computer: <span id="computerScore">0</span>
</div>

<div class="result" id="resultText">Make your move!</div>
<div class="winner" id="winnerText"></div>

<script>
let playerScore = 0;
let computerScore = 0;

function getComputerChoice() {
    const choices = ['rock', 'paper', 'scissors'];
    return choices[Math.floor(Math.random() * 3)];
}

function playGame(playerChoice) {
    if (playerScore >= 5 || computerScore >= 5) return;

    const computerChoice = getComputerChoice();
    let result = "";

    if (playerChoice === computerChoice) {
        result = "It's a tie! No points awarded.";
    } else if (
        (playerChoice === 'rock' && computerChoice === 'scissors') ||
        (playerChoice === 'paper' && computerChoice === 'rock') ||
        (playerChoice === 'scissors' && computerChoice === 'paper')
    ) {
        playerScore++;
        result = `You win! ${playerChoice} beats ${computerChoice}.`;
    } else {
        computerScore++;
        result = `You lose! ${computerChoice} beats ${playerChoice}.`;
    }

    document.getElementById("playerScore").textContent = playerScore;
    document.getElementById("computerScore").textContent = computerScore;
    document.getElementById("resultText").textContent = result;

    if (playerScore === 5) {
        document.getElementById("winnerText").textContent = "🎉 You won the game!";
    } else if (computerScore === 5) {
        document.getElementById("winnerText").textContent = "💻 Computer wins the game!";
    }
}
</script>

</body>
</html>
